<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IOQM Past Papers</title>
<script src="https://cdn.jsdelivr.net/npm/tsparticles@2.10.1/tsparticles.min.js"></script>
<script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" id="MathJax-script"></script>
<style>
html, body {
    margin:0; padding:0; width:100%; height:100%;
    font-family: Arial; background:#0a0a0a; color:#fff;
    overflow-x:hidden;
}
#particles-js { position:absolute; width:100%; height:100%; z-index:0; }

#content {
    position:relative; z-index:1; padding:50px 20px; max-width:1000px; margin:auto;
}

h1 { color:#0ff; text-shadow:0 0 20px #0ff; text-align:center; margin-bottom:20px; }

.question {
    background: rgba(0,0,0,0.5);
    border-radius:15px; padding:20px; margin-bottom:30px;
    box-shadow: 0 0 20px #0ff;
    user-select:none; /* prevent copy-paste */
}

.question h2 { color:#ff0; margin-bottom:10px; }
.question p { line-height:1.6; }
.question canvas, .figure-container { margin:10px 0; text-align:center; }

input.answer-input {
    width:80px; padding:5px; font-size:18px; border-radius:8px;
    border:2px solid #0ff; background:#111; color:#0ff;
    text-align:center;
}

button {
    margin-left:10px; padding:6px 12px; font-size:16px;
    border-radius:8px; border:none; cursor:pointer;
    background:#0ff; color:#000;
    transition: all 0.3s ease;
}

button:hover { box-shadow:0 0 20px #0ff; transform: scale(1.05); }

.solution { display:none; background:rgba(255,255,255,0.05); margin-top:15px; padding:15px; border-radius:10px; }

</style>
</head>
<body>

<div id="particles-js"></div>

<div id="content">
    <h1>IOQM Past Papers</h1>

    <!-- Example Question Template -->
    <div class="question" data-question-id="1">
        <h2>Question 1</h2>
        <p>
            A number is chosen randomly from 0 to 99. What is the remainder when it is divided by 7?
        </p>
        <!-- Optional figure -->
        <div class="figure-container">
            <!-- You can insert a canvas or image here -->
            <canvas id="fig1" width="200" height="200"></canvas>
        </div>

        <!-- Answer input -->
        <label>Answer: </label>
        <input type="number" class="answer-input" min="0" max="99">
        <button onclick="checkAnswer(this)">Check Answer</button>
        <button onclick="toggleSolution(this)">Show Solution</button>

        <div class="solution">
            <p>Solution: Any number modulo 7 gives remainder between 0-6. So the remainder depends on the number chosen. For example, 10 mod 7 = 3.</p>
        </div>
    </div>

    <!-- Add more questions here -->
</div>

<script>
// ---------- Particle Background ----------
tsParticles.load("particles-js", {
    particles: {
        number: { value: 80 },
        color: { value: ["#0ff","#ff0","#f0f"] },
        shape: { type: "circle" },
        opacity: { value: 0.5, random:true },
        size: { value: 3, random:true },
        move: { enable:true, speed:2, direction:"none", outMode:"bounce" },
        links: { enable:true, distance:150, color:"#0ff", opacity:0.2, width:1 }
    },
    interactivity: {
        events: { onHover:{ enable:true, mode:"repulse" } },
        modes:{ repulse:{ distance:100 } }
    },
    background: { color:"#0a0a0a" }
});

// ---------- Answer Checking ----------
function checkAnswer(button) {
    const questionDiv = button.closest('.question');
    const input = questionDiv.querySelector('.answer-input');
    const val = parseInt(input.value);
    if(isNaN(val) || val<0 || val>=100) {
        alert("Enter a valid non-negative integer less than 100.");
        return;
    }

    // You can set correct answer here dynamically for each question
    const correctAnswers = { "1": 3 }; // Example for question 1
    const qid = questionDiv.dataset.questionId;
    if(correctAnswers[qid] === val) {
        alert("✅ Correct!");
    } else {
        alert("❌ Incorrect.");
    }
}

// ---------- Toggle Solution ----------
function toggleSolution(button) {
    const questionDiv = button.closest('.question');
    const solDiv = questionDiv.querySelector('.solution');
    if(solDiv.style.display === "none") solDiv.style.display = "block";
    else solDiv.style.display = "none";
}

// ---------- Example: Drawing on Canvas ----------
const canvas = document.getElementById('fig1');
const ctx = canvas.getContext('2d');
ctx.strokeStyle = "#0ff";
ctx.lineWidth = 2;
ctx.beginPath();
ctx.arc(100,100,50,0,2*Math.PI);
ctx.stroke();

// ---------- MathJax Rendering ----------
MathJax.typesetPromise(); // To render any LaTeX you insert in <p> or <div>
</script>

</body>
</html>
