<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IOQM Past Papers</title>
<script src="https://cdn.jsdelivr.net/npm/tsparticles@2.10.1/tsparticles.min.js"></script>
<script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" id="MathJax-script"></script>
<style>
html, body {
    margin:0; padding:0; width:100%; height:100%;
    font-family: Arial; background:#0a0a0a; color:#fff;
    overflow-x:hidden;
}
#particles-js { position:absolute; width:100%; height:100%; z-index:0; }

#content {
    position:relative; z-index:1; padding:50px 20px; max-width:800px; margin:auto;
}

h1 { color:#0ff; text-shadow:0 0 20px #0ff; text-align:center; margin-bottom:20px; }

.question, #selection {
    background: rgba(0,0,0,0.5);
    border-radius:15px; padding:20px; margin-bottom:30px;
    box-shadow: 0 0 20px #0ff;
    user-select:none;
}

.question h2, #selection h2 { color:#ff0; margin-bottom:10px; }
.question p { line-height:1.6; }

input.answer-input {
    width:80px; padding:5px; font-size:18px; border-radius:8px;
    border:2px solid #0ff; background:#111; color:#0ff;
    text-align:center;
}

button {
    margin:5px 5px 0 0; padding:6px 12px; font-size:16px;
    border-radius:8px; border:none; cursor:pointer;
    background:#0ff; color:#000;
    transition: all 0.3s ease;
}

button:hover { box-shadow:0 0 20px #0ff; transform: scale(1.05); }

.solution { display:none; background:rgba(255,255,255,0.05); margin-top:15px; padding:15px; border-radius:10px; }

label { margin-right:10px; }
select { padding:5px 10px; border-radius:8px; border:2px solid #0ff; background:#111; color:#0ff; margin-right:15px; }
</style>
</head>
<body>

<div id="particles-js"></div>

<div id="content">
    <h1>IOQM Past Papers</h1>

    <!-- Selection UI -->
    <div id="selection">
        <h2>Select Year & Difficulty</h2>
        <label for="year-select">Year:</label>
        <select id="year-select">
            <option value="">--Select Year--</option>
            <option value="2017">2017</option>
            <option value="2018">2018</option>
            <option value="2019">2019</option>
            <option value="2020">2020</option>
            <option value="2021">2021</option>
            <option value="2022">2022</option>
            <option value="2023">2023</option>
            <option value="2024">2024</option>
            <option value="2025">2025</option>
        </select>

        <label for="difficulty-select">Difficulty:</label>
        <select id="difficulty-select">
            <option value="">--Select Difficulty--</option>
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
        </select>

        <button onclick="startPaper()">Start Paper</button>
    </div>
</div>

<script>
// ---------- Particle Background ----------
tsParticles.load("particles-js", {
    particles: {
        number: { value: 80 },
        color: { value: ["#0ff","#ff0","#f0f"] },
        shape: { type: "circle" },
        opacity: { value: 0.5, random:true },
        size: { value: 3, random:true },
        move: { enable:true, speed:2, direction:"none", outMode:"bounce" },
        links: { enable:true, distance:150, color:"#0ff", opacity:0.2, width:1 }
    },
    interactivity: {
        events: { onHover:{ enable:true, mode:"repulse" } },
        modes:{ repulse:{ distance:100 } }
    },
    background: { color:"#0a0a0a" }
});

// ---------- Past Papers Data ----------
const pastPapers = {
    "2023": {
        "easy": [
            { q: "A number is chosen randomly from 0 to 99. What is the remainder when it is divided by 7?", a: 3 },
            { q: "Find 5 + 7.", a: 12 }
        ],
        "medium": [
            { q: "If x + 2 = 5, find x.", a: 3 }
        ],
        "hard": [
            { q: "Find remainder when 12345 is divided by 9.", a: 6 }
        ]
    },
    "2024": {
        "easy": [
            { q: "What is 2^3?", a: 8 }
        ],
        "medium": [],
        "hard": []
    }
    // Add more years/difficulties/questions here
};

// ---------- Global Variables ----------
let currentPaper = [];
let currentQuestionIndex = 0;

// ---------- Start Paper ----------
function startPaper() {
    const year = document.getElementById('year-select').value;
    const difficulty = document.getElementById('difficulty-select').value;

    if(!year || !difficulty) { alert("Please select both year and difficulty!"); return; }

    // Check if questions exist
    if(!pastPapers[year] || !pastPapers[year][difficulty] || pastPapers[year][difficulty].length === 0) {
        alert("No questions available for this year/difficulty.");
        return;
    }

    currentPaper = pastPapers[year][difficulty];
    currentQuestionIndex = 0;

    document.getElementById('selection').style.display = "none";
    renderQuestion();
}

// ---------- Render Question ----------
function renderQuestion() {
    const container = document.getElementById('content');
    const qObj = currentPaper[currentQuestionIndex];

    container.innerHTML = `
        <div class="question">
            <h2>Question ${currentQuestionIndex + 1} of ${currentPaper.length}</h2>
            <p>${qObj.q}</p>

            <label>Answer: </label>
            <input type="number" class="answer-input" min="0" max="99">
            <button onclick="checkAnswer()">Check Answer</button>
            <button onclick="toggleSolution()">Show Solution</button>

            <div class="solution" style="display:none;">
                <p>Solution: ${qObj.a}</p>
            </div>
            <br>
            <button onclick="nextQuestion()">Next &rarr;</button>
        </div>
    `;

    MathJax.typesetPromise(); // render any LaTeX
}

// ---------- Answer Checking ----------
function checkAnswer() {
    const input = document.querySelector('.answer-input');
    const val = parseInt(input.value);
    const correctAnswer = currentPaper[currentQuestionIndex].a;

    if(isNaN(val) || val < 0 || val >= 100) {
        alert("Enter a valid non-negative integer less than 100.");
        return;
    }

    if(val === correctAnswer) alert("✅ Correct!");
    else alert("❌ Incorrect. Try again.");
}

// ---------- Toggle Solution ----------
function toggleSolution() {
    const solDiv = document.querySelector('.solution');
    solDiv.style.display = solDiv.style.display === "none" ? "block" : "none";
}

// ---------- Next Question ----------
function nextQuestion() {
    if(currentQuestionIndex < currentPaper.length - 1) {
        currentQuestionIndex++;
        renderQuestion();
    } else {
        // Paper finished, go back to selection menu
        alert("🎉 You have completed this paper!");
        document.getElementById('content').innerHTML = `
            <h1>IOQM Past Papers</h1>
            <div id="selection" style="display:block;">
                <h2>Select Year & Difficulty</h2>
                <label for="year-select">Year:</label>
                <select id="year-select">
                    <option value="">--Select Year--</option>
                    <option value="2017">2017</option>
                    <option value="2018">2018</option>
                    <option value="2019">2019</option>
                    <option value="2020">2020</option>
                    <option value="2021">2021</option>
                    <option value="2022">2022</option>
                    <option value="2023">2023</option>
                    <option value="2024">2024</option>
                    <option value="2025">2025</option>
                </select>

                <label for="difficulty-select">Difficulty:</label>
                <select id="difficulty-select">
                    <option value="">--Select Difficulty--</option>
                    <option value="easy">Easy</option>
                    <option value="medium">Medium</option>
                    <option value="hard">Hard</option>
                </select>

                <button onclick="startPaper()">Start Paper</button>
            </div>
        `;
    }
}
</script>

</body>
</html>
