<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IOQM - Home</title>
<script src="https://cdn.jsdelivr.net/npm/tsparticles@2.10.1/tsparticles.min.js"></script>
<style>
html, body {
    margin:0; padding:0; width:100%; height:100%;
    font-family: Arial, sans-serif; background:#0a0a0a; color:#fff;
    overflow:hidden;
}
#particles-js {
    position:absolute; width:100%; height:100%; z-index:0;
}

#content {
    position:relative; z-index:1; text-align:center;
    top:20%; transform: translateY(-20%);
}

h1 {
    font-size:64px; color:#0ff; text-shadow: 0 0 20px #0ff, 0 0 40px #0ff;
    margin-bottom:10px;
}
h2 {
    font-size:32px; color:#ff0; text-shadow: 0 0 15px #ff0;
    margin-bottom:50px;
}

.nav-links {
    display:flex; flex-direction: column; gap:25px; align-items:center;
}
.nav-links a {
    display:inline-block;
    padding:20px 40px;
    font-size:22px;
    text-decoration:none;
    color:#fff;
    border:2px solid #0ff;
    border-radius:15px;
    text-shadow: 0 0 10px #0ff;
    transition: all 0.3s ease;
}
.nav-links a:hover {
    color:#0ff;
    background: rgba(0,255,255,0.1);
    box-shadow: 0 0 30px #0ff, 0 0 60px #0ff;
    transform: scale(1.1);
}
</style>
</head>
<body>

<div id="particles-js"></div>

<div id="content">
    <h1>IOQM</h1>
    <h2>Indian Olympiad Qualifier in Mathematics</h2>

    <div class="nav-links">
        <a href="past-papers.html">Past Papers</a>
        <a href="past-cutoffs.html">Past Cut-offs</a>
        <a href="practice.html">Practice</a>
        <a href="ranking.html">State Rankings</a>
    </div>
</div>

<script>
// Animated particle background
tsParticles.load("particles-js", {
    particles: {
        number: { value: 100 },
        color: { value: ["#0ff","#ff0","#f0f"] },
        shape: { type: "circle" },
        opacity: { value: 0.6, random:true },
        size: { value: 4, random:true },
        move: { enable:true, speed:2, direction:"none", outMode:"bounce" },
        links: { enable:true, distance:150, color:"#0ff", opacity:0.2, width:1 }
    },
    interactivity: {
        events: { onHover:{ enable:true, mode:"repulse" }, onClick:{ enable:true, mode:"push" } },
        modes:{ repulse:{ distance:120 }, push:{ quantity:4 } }
    },
    background: { color:"#0a0a0a" }
});
</script>

</body>
</html>
