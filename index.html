<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Insane Animated Exam Cutoffs</title>
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tsparticles@2.10.1/tsparticles.min.js"></script>
<style>
    html, body {
        margin:0;
        padding:0;
        width:100%;
        height:100%;
        overflow:hidden;
        background:#0a0a0a;
        font-family: Arial, sans-serif;
        color:#fff;
    }
    #particles-js {
        position:absolute;
        width:100%;
        height:100%;
        z-index:0;
    }
    #content {
        position:relative;
        z-index:1;
        text-align:center;
        padding-top:50px;
    }
    select {
        margin:10px;
        padding:5px;
    }
    #graph {
        width:90%;
        max-width:1000px;
        height:600px;
        margin:auto;
        background: rgba(0,0,0,0.5);
        border-radius:15px;
        padding:10px;
    }
</style>
</head>
<body>

<div id="particles-js"></div>

<div id="content">
    <h1>🔥 Exam Cutoffs Dashboard 🔥</h1>

    <label>Choose Year:</label>
    <select id="yearSelect"></select>

    <label>Choose State:</label>
    <select id="stateSelect"></select>

    <div id="graph"></div>
</div>

<script>
// ---------- Particles Background ----------
tsParticles.load("particles-js", {
    particles: {
        number: { value: 80 },
        color: { value: ["#00ffff", "#ff00ff", "#ff0000"] },
        shape: { type: "circle" },
        opacity: { value: 0.5, random:true },
        size: { value: 3, random:true },
        move: { enable:true, speed:2, direction:"none", outMode:"bounce" },
        links: { enable:true, distance:150, color:"#ffffff", opacity:0.2, width:1 }
    },
    interactivity: {
        events: { onHover:{ enable:true, mode:"repulse" } },
        modes:{ repulse:{ distance:100 } }
    },
    background: { color:"#0a0a0a" }
});
</script>

<script>
// ---------- Dynamic Plotly Graph ----------
let dataJSON = {};

// Sample JSON, you can replace with fetch('cutoffs.json') dynamically
dataJSON = {
    "2023": {"California":85,"Texas":78,"Florida":90,"New York":82},
    "2024": {"California":88,"Texas":81,"Florida":92,"New York":85}
};

function populateDropdowns() {
    const years = Object.keys(dataJSON);
    const states = Object.keys(dataJSON[years[0]]);
    
    const yearSelect = document.getElementById('yearSelect');
    const stateSelect = document.getElementById('stateSelect');
    
    years.forEach(y => yearSelect.add(new Option(y, y)));
    states.forEach(s => stateSelect.add(new Option(s, s)));
    
    yearSelect.onchange = updateGraph;
    stateSelect.onchange = updateGraph;
}

function updateGraph() {
    const selectedYear = document.getElementById('yearSelect').value;
    const selectedState = document.getElementById('stateSelect').value;

    const years = Object.keys(dataJSON);
    const states = Object.keys(dataJSON[years[0]]);

    let xData=[], yData=[], title='';

    if(selectedYear && selectedState) {
        xData=[selectedState]; yData=[dataJSON[selectedYear][selectedState]];
        title=`Cutoff for ${selectedState} in ${selectedYear}`;
    } else if(selectedYear) {
        xData=states;
        yData=states.map(s=>dataJSON[selectedYear][s]);
        title=`State vs Cutoff for ${selectedYear}`;
    } else if(selectedState) {
        xData=years;
        yData=years.map(y=>dataJSON[y][selectedState]);
        title=`Year vs Cutoff for ${selectedState}`;
    }

    const trace = {
        x:xData, y:yData, type:'bar',
        marker:{ color:yData.map(v=>v>=85?'#00ff00':v>=80?'#ffff00':'#ff0000') },
        text:yData.map(v=>v.toString()), textposition:'auto',
        hoverinfo:'x+y', hoverlabel:{bgcolor:"#111"}
    };

    const layout = {
        title: title,
        paper_bgcolor:'rgba(0,0,0,0)',
        plot_bgcolor:'rgba(0,0,0,0)',
        xaxis:{ title:'X Axis', color:'#fff' },
        yaxis:{ title:'Cutoff', range:[0,100], color:'#fff' },
        transition:{ duration:1000, easing:'cubic-in-out' }
    };

    Plotly.newPlot('graph',[trace],layout,{responsive:true});
}

populateDropdowns();
updateGraph();
</script>

</body>
</html>
