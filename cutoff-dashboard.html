<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Futuristic Exam Cutoffs Dashboard</title>
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tsparticles@2.10.1/tsparticles.min.js"></script>
<style>
html, body {
    margin:0; padding:0; width:100%; height:100%; overflow:hidden;
    background:#0a0a0a; font-family:Arial; color:#fff;
}
#particles-js { position:absolute; width:100%; height:100%; z-index:0; }

#content {
    position:relative; z-index:1; text-align:center; padding-top:40px;
}

select {
    margin:10px; padding:5px; font-size:16px;
}

#graph {
    width:90%; max-width:1100px; height:600px; margin:auto;
    background: linear-gradient(90deg, rgba(0,0,0,0.4), rgba(0,0,0,0.6));
    border-radius:20px; padding:20px; box-shadow: 0 0 20px #00ffff;
}
</style>
</head>
<body>

<div id="particles-js"></div>

<div id="content">
    <h1 style="color:#0ff; text-shadow:0 0 20px #0ff;">🚀 Exam Cutoffs Dashboard 🚀</h1>

    <label>Choose Year:</label>
    <select id="yearSelect">
        <option value="">--Select Year--</option>
    </select>

    <label>Choose State:</label>
    <select id="stateSelect">
        <option value="">--Select State--</option>
    </select>

    <div id="graph"></div>
</div>

<script>
// ---------- Neon Particles Background ----------
tsParticles.load("particles-js", {
    particles: {
        number: { value: 120 },
        color: { value: ["#00ffff","#ff00ff","#ff0000"] },
        shape: { type: "circle" },
        opacity: { value: 0.6, random:true },
        size: { value: 4, random:true },
        move: { enable:true, speed:3, direction:"none", outMode:"bounce" },
        links: { enable:true, distance:150, color:"#00ffff", opacity:0.2, width:1 }
    },
    interactivity: {
        events: { onHover:{ enable:true, mode:"repulse" }, onClick:{ enable:true, mode:"push" } },
        modes:{ repulse:{ distance:120 }, push:{ quantity:4 } }
    },
    background: { color:"#0a0a0a" }
});
</script>

<script>
// ---------- Dynamic Plotly Graph with Neon Glow ----------
let dataJSON = {
    "2023": {"Delhi":17,"Rajasthan":12,"Gujarat":10,"Mumbai":10, "Top 10%":10},
    "2024": {"Delhi":35,"Rajasthan":34,"Gujarat":25,"Mumbai":25, "Top 10%":24},
    "2025": {"Delhi":37,"Rajasthan":34,"Gujarat":25,"Mumbai":28, "Top 10%":24}
};

function populateDropdowns() {
    const years = Object.keys(dataJSON);
    const states = Object.keys(dataJSON[years[0]]);
    
    const yearSelect = document.getElementById('yearSelect');
    const stateSelect = document.getElementById('stateSelect');

    years.forEach(y => yearSelect.add(new Option(y, y)));
    states.forEach(s => stateSelect.add(new Option(s, s)));

    yearSelect.onchange = function(){
        stateSelect.value = ""; // Reset state
        updateGraph();
    };
    stateSelect.onchange = function(){
        yearSelect.value = ""; // Reset year
        updateGraph();
    };
}

function updateGraph() {
    const selectedYear = document.getElementById('yearSelect').value;
    const selectedState = document.getElementById('stateSelect').value;

    const years = Object.keys(dataJSON);
    const states = Object.keys(dataJSON[years[0]]);

    let xData=[], yData=[], title='';

    if(selectedYear) {
        xData = states;
        yData = states.map(s=>dataJSON[selectedYear][s]);
        title = `State vs Cutoff for ${selectedYear}`;
    } else if(selectedState) {
        xData = years;
        yData = years.map(y=>dataJSON[y][selectedState]);
        title = `Year vs Cutoff for ${selectedState}`;
    } else {
        xData = states;
        yData = states.map(s=>dataJSON[years[0]][s]);
        title = `State vs Cutoff for ${years[0]}`;
    }

    const colors = yData.map(v=>v>=85?'#0ff':v>=80?'#ff0':'#f00');

    const trace = {
        x:xData,
        y:yData,
        type:'bar',
        marker:{
            color:colors,
            line:{ color:'#0ff', width:2 },
        },
        text:yData.map(v=>v.toString()),
        textposition:'auto',
        hoverinfo:'x+y',
        hoverlabel:{ bgcolor:"#111", font:{ color:"#0ff", size:14 } },
        // neon pulse on hover
        transforms: [
            {
                type: 'groupby',
                groups: xData
            }
        ]
    };

    const layout = {
        title: { text:title, font:{ color:'#0ff', size:24 } },
        paper_bgcolor:'rgba(0,0,0,0)',
        plot_bgcolor:'rgba(0,0,0,0)',
        xaxis:{ title:'X Axis', color:'#0ff', tickfont:{ size:14 } },
        yaxis:{ title:'Cutoff', range:[0,100], color:'#0ff', tickfont:{ size:14 } },
        transition:{ duration:1200, easing:'cubic-in-out' },
        font:{ color:'#0ff' }
    };

    Plotly.newPlot('graph',[trace],layout,{responsive:true});
}

populateDropdowns();
updateGraph();
</script>

</body>
</html>
